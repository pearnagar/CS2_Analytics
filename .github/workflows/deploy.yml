name: Deploy CS2 Analytics

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint - api
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Hadolint - scraper
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: scraper/Dockerfile

      - name: Hadolint - frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./charts/cs2-analytics

  build-and-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    strategy:
      matrix:
        service: [scraper, api, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-${{ matrix.service }}:${{ github.sha }}
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-${{ matrix.service }}:latest

      - name: Scan ${{ matrix.service }} image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-scan
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      # - name: Deploy with Helm
      #   run: |
      #     helm upgrade --install cs2-analytics ./charts/cs2-analytics \
      #       --set api.image.repository=${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-api \
      #       --set api.image.tag=${{ github.sha }} \
      #       --set frontend.image.repository=${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-frontend \
      #       --set frontend.image.tag=${{ github.sha }} \
      #       --set scraper.image.repository=${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-scraper \
      #       --set scraper.image.tag=${{ github.sha }} \
      #       --set global.imagePullPolicy=IfNotPresent \
      #       --atomic \
      #       --timeout 5m
