name: Deploy CS2 Analytics

on:
  push:
    branches: [main]

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push scraper
        uses: docker/build-push-action@v5
        with:
          context: ./scraper
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-scraper:${{ github.sha }}
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-scraper:latest

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-api:${{ github.sha }}
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-api:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-frontend:${{ github.sha }}
            ${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-frontend:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      # - name: Deploy with Helm
      #   run: |
      #     helm upgrade --install cs2-analytics ./charts/cs2-analytics \
      #       --set api.image.repository=${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-api \
      #       --set api.image.tag=${{ github.sha }} \
      #       --set frontend.image.repository=${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-frontend \
      #       --set frontend.image.tag=${{ github.sha }} \
      #       --set scraper.image.repository=${{ env.DOCKERHUB_NAMESPACE }}/cs2-analytics-scraper \
      #       --set scraper.image.tag=${{ github.sha }} \
